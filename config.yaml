config:
  log_conf_file: "log_conf.yaml"
  log_messages: "log_messages.yaml"

model:
  window_size: 30
  threshold: 0.7
  det_per: 0.005

# jpx_mlbot_15m transaction cost model (#8 C4). Conservative retail baseline;
# no maker rebate (JP equities have none). tick_table omitted -> JPX 呼値 default.
cost:
  commission_rate: 0.0005     # 委託手数料: per side, fraction of notional (5 bps)
  slippage_ticks: 1.0         # スリッページ: JPX ticks per side
  borrow_fee_annual: 0.0365   # 貸株料: annual rate on SHORT notional (~1 bp/day)
